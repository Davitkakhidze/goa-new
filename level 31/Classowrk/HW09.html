<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   
    <style>
        .left {
            color: red;
            font-size: 24px;
            text-align: left;
        }
        .center {
            color: blue;
            font-size: 28px;
            text-align: center;
        }
        .right {
            color: green;
            font-size: 32px;
            text-align: right;
        }
        .justify {
            color: purple;
            font-size: 20px;
            text-align: justify;
            max-width: 600px;
           
        }
    </style>
</head>
<body>
    <p class="left">ეს არის პირველი ტექსტი, მარცხნივ განლაგებული.</p>
    <p class="center">ეს არის მეორე ტექსტი, ცენტრში განლაგებული.</p>
    <p class="right">ეს არის მესამე ტექსტი, მარჯვნივ განლაგებული.</p>
    <p class="justify">ეს არის მეოთხე ტექსტი, რომელიც გაქცეულია justify სტილით და აქვს განსხვავებული ფერი და ზომა.</p>
</body>
</html>
