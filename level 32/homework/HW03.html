<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remove BMW</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            width: 400px;
        }
        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 10px 20px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #2980b9;
        }
        h2 { color: #333; }
        .result { font-size: 1.1rem; font-weight: bold; color: #2cc7c9; margin-top: 15px; word-wrap: break-word; }
        .error { color: #e74c3c; }
    </style>
</head>
<body>

<div class="container">
    <h2>BMW-ს ასოების მოცილება</h2>
    <input type="text" id="textInput" placeholder="ჩაწერე ტექსტი...">
    <button onclick="runTest()">გაშვება</button>
    <div id="output" class="result"></div> 
</div>

<script>
  
    function removeBMW(str) {
       
        if (typeof str !== 'string') {
            throw new Error("This program only works for text.");
        }
        
       
        return str.replace(/[bmwBMW]/g, '');
    }

   
    function runTest() {
        const inputVal = document.getElementById("textInput").value;
        const outputDiv = document.getElementById("output");
        
        try {
            outputDiv.classList.remove("error");
         
            const result = removeBMW(inputVal);
            outputDiv.innerText = "შედეგი: " + result;
        } catch (err) {
            outputDiv.classList.add("error");
            outputDiv.innerText = "შეცდომა: " + err.message;
        }
    }
</script>

</body>
</html>
