<!-- კომენტარების სახით ახსენით რაში ვიყენებთ Attributes და ჩამოთვალეთ ისინი. არ დაგავიწყდეთ თითოეული ატრიბუტისთვის თავისი დანიშნულების მიწერა და რომელ ტიპს მიეკუთვნება optional თუ required ;) -->
<!-- Attributes გამოიყენება HTML ელემენტების თვისებების განსაზღვრაში. ისინი გვაძლევენ დამატებით ინფორმაციას ელემენტის შესახებ და განსაზღვრავენ მისი ქცევას. ატრიბუტები შეიძლება იყოს optional (არასავალდებულო) ან required (სავალდებულო) ტიპის, რაც დამოკიდებულია იმაზე, თუ რამდენად აუცილებელია მათი არსებობა ელემენტისთვის. -->
<!-- 1. id (required) - გამოიყენება ელემენტის უნიკალური იდენტიფიკაციისთვის. ეს ატრიბუტი საშუალებას გვაძლევს მივმართოთ კონკრეტულ ელემენტს CSS-ით ან JavaScript-ით. -->
<!-- 2. class (optional) - გამოიყენება ელემენტის კლასის განსაზღვრაში. ეს ატრიბუტი საშუალებას გვაძლევს მივმართოთ ერთ ან რამდენიმე ელემენტს CSS-ით ან JavaScript-ით, რომლებიც ერთსა და იმავე კლასს იყენებენ. -->
<!-- 3. src (required) - გამოიყენება <img> ელემენტისთვის და განსაზღვრავს გამოსახულების წყაროს URL-ით. -->
<!-- 4. href (required) - გამოიყენება <a> ელემენტისთვის და განსაზღვრავს ჰიპერბმულის URL-ით. -->
<!-- 5. alt (optional) - გამოიყენება <img> ელემენტისთვის და განსაზღვრავს ალტერნატიულ ტექსტს, რომელიც გამოჩნდება, თუ გამოსახულება არ არის ხელმისაწვდომი. -->
